# 10x-resolution Milky Way-Andromeda-like merger test.
#
# Run with:
#   swift-spiral-ics examples/mw_m31_merger_10x.yml
#
# This file is intended as a data-motivated MW-M31 future-merger analogue for the
# idealized machinery in this repository. It uses commonly adopted present-day
# Local Group constraints: MW-M31 separation ~780 kpc, radial approach speed
# ~-110 km/s, low tangential speed, M31 more massive and more bulge dominated
# than the MW, explicit central SMBHs, and a low-density background medium.
#
# Remaining idealizations are explicit: isolated NFW+Hernquist+exponential-disc
# galaxies, LMC/SMC analogues but no M33 or broader satellite population, no
# cosmological environment, an idealized hot CGM, and only a single inclination
# angle per disc rather than full observed sky orientation. All lengths are in
# kpc, velocities in km/s, masses in Msun, and times in Gyr or Myr as indicated
# by the key names.

output:
  # Initial-condition HDF5 file and SWIFT parameter YAML written by the generator.
  ics: mw_m31_merger_10x.hdf5
  params: mw_m31_merger_10x.yml
  run_name: mw_m31_merger_10x
  snapshot_basename: snapshot

simulation:
  # Large enough to hold a present-day-like 780 kpc binary plus extended NFW halos
  # without immediate wrapping.
  box_kpc: 2500

  # Reproducible stochastic particle sampling.
  seed: 42

  # Conservative timestepping for the early test problem. Increase only after
  # checking the generated YAML and short SWIFT smoke tests.
  max_timestep_gyr: 0.0005
  dt_min_gyr: 1.0e-6

  # Long integration for the present-day-like separation. A 4.5 Gyr test can be
  # only first passage for this setup, so this example runs for 12 Gyr to capture
  # extended post-passage evolution and final coalescence if the chosen masses and
  # orbit merge efficiently.
  time_end_gyr: 12.0

  # 25 Myr cadence gives ~480 snapshots over 12 Gyr. Use 10 Myr only for shorter
  # diagnostic runs; otherwise output volume becomes unnecessarily large.
  snapshot_dt_myr: 25.0
  # Lower than the EAGLE default for the first relaxation runs. These idealized
  # discs are not pre-relaxed, so full feedback can amplify initial transients.
  feedback_scale: 0.3

particle_masses:
  # 10x finer than mw_m31_merger.yml. This gives baryonic particles of 10^5 Msun
  # and dark-matter particles of 10^6 Msun while keeping the same physical model.
  dm_msun: 1.0e6
  stars_msun: 1.0e5
  gas_msun: 1.0e5

orbit:
  # Observed-like two-body setup. The generator places both galaxy centres in the
  # centre-of-mass frame, with the relative separation along x and the tangential
  # component along y before applying plane_angle_deg.
  type: relative_velocity

  # Initial centre-to-centre separation. Present-day MW-M31 is about 770-780 kpc.
  separation_kpc: 780

  # Present-day M31 radial velocity relative to the MW is about -110 km/s. The
  # tangential velocity is uncertain but HST-based constraints favour a very low
  # value (~17 km/s, with large uncertainty), so this is close to radial.
  radial_velocity_kms: -110
  tangential_velocity_kms: 17

  # Rotate the orbital plane around the y-axis. Keep zero for an x-y orbit plane.
  plane_angle_deg: 0

grid:
  # Potential/kinematic grid resolution used during IC generation. These values
  # are moderate; increase for production once the setup is behaving sensibly.
  nR: 128
  nz: 128

  # Also used as the gravity softening length written into the SWIFT YAML.
  eps_kpc: 0.8

  # Scheduler/domain controls in the generated SWIFT YAML. With this 2.5 Mpc box
  # and 16 top-level cells, 0.25 gives h_max = 39.06 kpc. The low-density gas
  # background below should prevent the pathological vacuum smoothing lengths
  # that made the earlier no-background setup fail.
  h_max_cell_fraction: 0.25
  scheduler_tasks_per_cell: 100
  max_top_level_cells: 16

background:
  # Very low-density numerical floor outside the explicit galaxy CGM components
  # below. At gas_msun = 1e6 and radius_kpc = 1200 this adds only ~7k particles.
  gas_density_msun_kpc3: 1.0
  dm_density_msun_kpc3: 0.0
  grid_kpc: 0.0
  radius_kpc: 1200

galaxies:
  - name: Milky Way
    masses:
      # Halo mass is the NFW M200. Stellar mass is total stars before splitting
      # into disc and bulge via bulge_fraction. These values are close to common
      # MW estimates: M200 ~ 1e12 Msun, Mstar ~ 5-6e10 Msun, cold gas ~ 1e10 Msun.
      dm_msun: 1.1e12
      stars_msun: 6.0e10
      gas_msun: 1.2e10
      bulge_fraction: 0.15
    halo:
      c200: 10
    bulge:
      a_kpc: 0.7
      rmax_scale: 50
    stellar_disk:
      # Exponential stellar disc scale length/height and target Toomre Q.
      scale_length_kpc: 2.6
      scale_height_kpc: 0.3
      Q: 2.0
    gas_disk:
      # Gas disc is more extended than the stellar disc. Keep it moderately thick
      # for unrelaxed ICs; very thin cold gas discs puff up violently at startup.
      scale_length_kpc: 5.5
      scale_height_kpc: 0.25
      Q: 1.5
    black_hole:
      # Sgr A* central SMBH. This writes an explicit PartType5 particle at the
      # galaxy centre rather than relying on FoF seeding during the run.
      mass_msun: 4.3e6
    cgm:
      # Hydrostatic hot MW circumgalactic medium. Keep the inner edge outside the
      # star-forming disc; putting dense hot gas at ~20 kpc caused violent early
      # transients in unrelaxed EAGLE runs. This is a conservative extended halo
      # intended to avoid vacuum boundaries without over-pressurising the disc.
      enabled: true
      mass_msun: 1.0e10
      r_min_kpc: 90
      r_max_kpc: 350
      core_radius_kpc: 100
      beta: 0.35
      temperature_floor_K: 1.0e5
      temperature_ceiling_K: 3.0e6
    spiral:
      # Mild gas spiral perturbation. Stellar discs are kept axisymmetric for
      # stable collisionless ICs until a matching spiral potential is implemented.
      n_arms: 2
      pitch_deg: 15
      strength: 0.15
      stream_frac: 0.02
    placement:
      # With orbit.type: relative_velocity, placement only controls disc orientation;
      # positions and bulk velocities are computed from the orbit block.
      inclination_deg: 0
      node_angle_deg: 0

  - name: Andromeda
    masses:
      # M31 is modeled as the more massive, larger, more bulge-dominated galaxy,
      # with a stellar mass near 1e11 Msun and less cold gas than the MW. It has
      # the larger halo, stellar mass, bulge fraction, stellar disc scale length,
      # stellar scale height, and gas disc scale length in this setup.
      dm_msun: 1.5e12
      stars_msun: 1.03e11
      gas_msun: 7.0e9
      bulge_fraction: 0.31
    halo:
      c200: 9.5
    bulge:
      a_kpc: 1.0
      rmax_scale: 50
    stellar_disk:
      scale_length_kpc: 5.3
      scale_height_kpc: 0.6
      Q: 2.0
    gas_disk:
      scale_length_kpc: 8.0
      scale_height_kpc: 0.3
      Q: 1.5
    black_hole:
      # M31's central SMBH is much more massive than Sgr A*.
      mass_msun: 1.4e8
    cgm:
      # Slightly more massive and extended hydrostatic hot halo for M31,
      # consistent with M31 being the larger system in this idealized analogue.
      # The inner edge is kept outside the bright disc to avoid early blast-like
      # pressure transients.
      enabled: true
      mass_msun: 1.5e10
      r_min_kpc: 100
      r_max_kpc: 400
      core_radius_kpc: 120
      beta: 0.35
      temperature_floor_K: 1.0e5
      temperature_ceiling_K: 3.0e6
    spiral:
      n_arms: 2
      pitch_deg: 15
      strength: 0.15
      stream_frac: 0.02
    placement:
      # M31's observed disc inclination is high (~77 deg). The generator only has
      # inclination plus a node rotation, so this captures both the high tilt and
      # approximate major-axis position angle (~38 deg) in this coordinate frame.
      inclination_deg: 77
      node_angle_deg: 38

  - name: LMC
    masses:
      # Massive Large Magellanic Cloud analogue. The LMC is dynamically important
      # for the MW barycentre and outer halo, so it is included as a live galaxy
      # rather than ignored. This is still an idealized compact disc+halo model.
      dm_msun: 1.0e11
      stars_msun: 2.7e9
      gas_msun: 5.0e8
      bulge_fraction: 0.0
    halo:
      c200: 12
    bulge:
      a_kpc: 0.3
      rmax_scale: 20
    stellar_disk:
      scale_length_kpc: 1.5
      scale_height_kpc: 0.3
      Q: 2.0
    gas_disk:
      scale_length_kpc: 2.5
      scale_height_kpc: 0.3
      Q: 1.5
    black_hole:
      mass_msun: 0.0
    cgm:
      enabled: false
    spiral:
      n_arms: 1
      pitch_deg: 25
      strength: 0.05
      stream_frac: 0.0
    placement:
      # Approximate present-day Galactocentric LMC position/velocity, in the same
      # arbitrary Cartesian frame used for the MW-M31 analogue. The generator then
      # recentres the full four-galaxy system on its total centre of mass.
      relative_to: Milky Way
      relative_position_kpc: [-1, -41, -28]
      relative_velocity_kms: [-57, -226, 221]
      inclination_deg: 35
      node_angle_deg: 130

  - name: SMC
    masses:
      # Small Magellanic Cloud analogue. The SMC is less massive than the LMC but
      # included to make the MW satellite system qualitatively closer to reality.
      dm_msun: 1.0e10
      stars_msun: 4.5e8
      gas_msun: 4.0e8
      bulge_fraction: 0.0
    halo:
      c200: 15
    bulge:
      a_kpc: 0.2
      rmax_scale: 20
    stellar_disk:
      scale_length_kpc: 1.0
      scale_height_kpc: 0.3
      Q: 2.0
    gas_disk:
      scale_length_kpc: 1.8
      scale_height_kpc: 0.3
      Q: 1.5
    black_hole:
      mass_msun: 0.0
    cgm:
      enabled: false
    spiral:
      n_arms: 1
      pitch_deg: 25
      strength: 0.05
      stream_frac: 0.0
    placement:
      # Approximate present-day Galactocentric SMC position/velocity.
      relative_to: Milky Way
      relative_position_kpc: [15, -38, -44]
      relative_velocity_kms: [19, -174, 173]
      inclination_deg: 45
      node_angle_deg: 45
