MetaData:
  run_name: swift_spiral_isolated

InternalUnitSystem:
  UnitMass_in_cgs: 1.98841e43       # grams (10^10 Msun)
  UnitLength_in_cgs: 3.085678e21    # centimeters (kpc)
  UnitVelocity_in_cgs: 1.0e5        # centimeters per second (km/s)
  UnitCurrent_in_cgs: 1.0
  UnitTemp_in_cgs: 1.0

Cosmology:
  Omega_cdm: 0.0
  Omega_lambda: 0.0
  Omega_b: 0.0
  h: 0.7
  a_begin: 1.0
  a_end: 1.0

TimeIntegration:
  time_begin: 0.0
  time_end: 2.0           # Gyr
  dt_min: 1e-6
  dt_max: 0.01

Snapshots:
  basename: snapshot
  scale_factor_first: 1.0
  time_first: 0.0
  delta_time: 0.01         # Gyr
  invoke_stf: 0
  recording_triggers_part: [1.0227e-4, 1.0227e-5]
  recording_triggers_bpart: [1.0227e-4, 1.0227e-5]

Statistics:
  delta_time: 0.01         # Gyr
  scale_factor_first: 1.0
  time_first: 0.0

Gravity:
  eta: 0.025
  theta: 0.7
  comoving_DM_softening: 0.1
  max_physical_DM_softening: 0.1
  comoving_baryon_softening: 0.1
  max_physical_baryon_softening: 0.1
  mesh_side_length: 64

SPH:
  resolution_eta: 1.2348
  h_min_ratio: 0.1
  h_max: 10.0
  CFL_condition: 0.1
  minimal_temperature: 100.0
  initial_temperature: 1e4
  particle_splitting: 1
  particle_splitting_mass_threshold: 2.0

InitialConditions:
  file_name: spiral_ic.hdf5
  periodic: 1
  cleanup_h_factors: 0
  cleanup_velocity_factors: 0
  generate_gas_in_ics: 0
  cleanup_smoothing_lengths: 1

EAGLEChemistry:
  init_abundance_metal: 0.01
  init_abundance_Hydrogen: 0.752
  init_abundance_Helium: 0.248
  init_abundance_Carbon: 0.0
  init_abundance_Nitrogen: 0.0
  init_abundance_Oxygen: 0.0
  init_abundance_Neon: 0.0
  init_abundance_Magnesium: 0.0
  init_abundance_Silicon: 0.0
  init_abundance_Iron: 0.0

EAGLECooling:
  dir_name: ./coolingtables
  H_reion_z: 11.5
  He_reion_z_centre: 3.5
  He_reion_z_sigma: 0.5
  He_reion_eV_p_H: 2.0

EAGLEStarFormation:
  SF_threshold: Subgrid
  SF_model: PressureLaw
  KS_normalisation: 1.515e-4
  KS_exponent: 1.4
  min_over_density: 100.0
  KS_high_density_threshold_H_p_cm3: 1e3
  EOS_entropy_margin_dex: 0.3
  threshold_norm_H_p_cm3: 0.1
  threshold_Z0: 0.002
  threshold_slope: -0.64
  threshold_max_density_H_p_cm3: 10.0
  threshold_number_density_H_p_cm3: 1.0

EAGLEFeedback:
  use_SNII_feedback: 1
  use_SNIa_feedback: 1
  use_AGB_enrichment: 1
  use_SNII_enrichment: 1
  use_SNIa_enrichment: 1
  filename: ./yieldtables/
  IMF_min_mass_Msun: 0.1
  IMF_max_mass_Msun: 100.0
  SNII_min_mass_Msun: 8.0
  SNII_max_mass_Msun: 100.0
  SNII_energy_erg: 1.0e51
  SNII_energy_fraction_min: 0.5
  SNII_energy_fraction_max: 3.0
  SNII_energy_fraction_Z_0: 0.0012663729
  SNII_energy_fraction_n_0_H_p_cm3: 0.67
  SNII_energy_fraction_n_Z: 0.8686
  SNII_energy_fraction_n_n: 0.8686
  SNII_feedback_model: Stochastic
  SNII_sampled_delay: 0
  SNII_delta_T_K: 4.070e7
  SNII_energy_fraction_function: PowerLaw
  SNII_energy_fraction_sigma_Z: 0.130265
  SNII_energy_fraction_sigma_n: 0.576114
  SNII_energy_fraction_use_birth_density: 1
  SNII_energy_fraction_use_birth_metallicity: 1
  SNIa_DTD: Exponential
  SNIa_DTD_delay_Gyr: 0.04
  SNIa_DTD_exp_timescale_Gyr: 3.0
  SNIa_DTD_exp_norm_p_Msun: 1.3e-3
  SNIa_energy_erg: 1.0e51
  AGB_ejecta_velocity_km_p_s: 10.0
  stellar_evolution_age_cut_Gyr: 20.0
  stellar_evolution_sampling_rate: 0.1
  SNII_yield_factor_Hydrogen: 1.0
  SNII_yield_factor_Helium: 1.0
  SNII_yield_factor_Carbon: 1.0
  SNII_yield_factor_Nitrogen: 1.0
  SNII_yield_factor_Oxygen: 1.0
  SNII_yield_factor_Neon: 1.0
  SNII_yield_factor_Magnesium: 1.0
  SNII_yield_factor_Silicon: 1.0
  SNII_yield_factor_Iron: 1.0

EAGLEAGN:
  subgrid_seed_mass_Msun: 1.0e4
  use_multi_phase_bondi: 0
  use_subgrid_bondi: 0
  with_angmom_limiter: 0
  viscous_alpha: 1.0e6
  with_boost_factor: 1
  boost_alpha_only: 1
  boost_alpha: 0.645
  boost_beta: 2.0
  boost_n_h_star_H_p_cm3: 0.1
  with_fixed_T_near_EoS: 0
  fixed_T_above_EoS_dex: 0.3
  fixed_T_near_EoS_K: 8000.0
  radiative_efficiency: 0.1
  use_nibbling: 1
  min_gas_mass_for_nibbling_Msun: 9.0e5
  max_eddington_fraction: 1.0
  eddington_fraction_for_recording: 0.1
  coupling_efficiency: 0.035
  AGN_feedback_model: MinimumDistance
  AGN_use_deterministic_feedback: 1
  use_variable_delta_T: 0
  AGN_with_locally_adaptive_delta_T: 0
  AGN_delta_T_mass_norm: 3.0e8
  AGN_delta_T_mass_reference: 1.0e8
  AGN_delta_T_mass_exponent: 0.666667
  AGN_delta_T_crit_factor: 1.0
  AGN_delta_T_background_factor: 0.0
  AGN_delta_T_min: 1.0e7
  AGN_delta_T_max: 3.0e9
  AGN_delta_T_K: 4.207e8
  AGN_use_nheat_with_fixed_dT: 0
  AGN_use_adaptive_energy_reservoir_threshold: 0
  AGN_num_ngb_to_heat: 1.0
  max_reposition_mass: 1.0e20
  max_reposition_distance_ratio: 3.0
  with_reposition_velocity_threshold: 0
  max_reposition_velocity_ratio: 0.5
  min_reposition_velocity_threshold: -1.0
  set_reposition_speed: 0
  with_potential_correction: 1
  threshold_major_merger: 0.333
  threshold_minor_merger: 0.1
  merger_threshold_type: DynamicalEscapeVelocity
  merger_max_distance_ratio: 3.0
  minimum_timestep_Myr: 0.1

EAGLEEntropyFloor:
  Jeans_density_threshold_H_p_cm3: 1.0e-4
  Jeans_over_density_threshold: 10.0
  Jeans_temperature_norm_K: 800.0
  Jeans_gamma_effective: 1.3333333
  Cool_density_threshold_H_p_cm3: 1.0e-5
  Cool_over_density_threshold: 10.0
  Cool_temperature_norm_K: 10.0
  Cool_gamma_effective: 1.0

LineOfSight:
  basename: eagle_los
  num_along_x: 0
  num_along_y: 0
  num_along_z: 100
  scale_factor_first: 0.1
  delta_time: 1.1

SPINJETAGN:
  use_jets: 1
  use_agn_feedback: 1
  use_bh_seeding: 1
  BH_seed_mass_Msun: 1e5
  BH_seed_halo_mass_Msun: 1e10
  viscous_alpha: 1e6
  jet_efficiency: 0.1
  radiative_efficiency: 0.1
  AGN_delta_T_K: 1e8
  AGN_heating_temperature_K: 1e8

Restarts:
  enable: 1
  save: 1
  delta_hours: 6.0
  max_run_time: 71.5
  resubmit_on_exit: 0
  resubmit_command: bash resubmit.sh
